services:
  postgres:
    image: postgres:16-alpine
    container_name: iot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_db
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: iot_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mosquitto
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://iot_user:iot_password@postgres:5432/iot_db
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_CLIENT_ID: iot-backend
      MQTT_KEEPALIVE: 60
      MQTT_QOS: 1
      MQTT_TASK_DISPATCH_TOPIC: iot/task/dispatch
      MQTT_TASK_RESULT_TOPIC: iot/task/result
      MQTT_DEVICE_HEARTBEAT_TOPIC: iot/device/heartbeat
      DEVICE_OFFLINE_TIMEOUT_SECONDS: 15
    ports:
      - "8000:8000"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    scale: ${AGENT_COUNT:-1}
    depends_on:
      - mosquitto
      - backend
    env_file:
      - .env
    environment:
      DEVICE_ID: ""
      DEVICE_ID_PREFIX: rpi-agent
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TASK_DISPATCH_TOPIC: iot/task/dispatch
      MQTT_TASK_RESULT_TOPIC: iot/task/result
      MQTT_DEVICE_HEARTBEAT_TOPIC: iot/device/heartbeat
    volumes:
      - /app/keys

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /backend-api
        NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
        NEXT_PUBLIC_WS_NACL_SECRET_KEY: ${NACL_SECRET_KEY}
        INTERNAL_API_BASE_URL: http://backend:8000
    container_name: iot_frontend
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /backend-api
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
      NEXT_PUBLIC_WS_NACL_SECRET_KEY: ${NACL_SECRET_KEY}
      INTERNAL_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
