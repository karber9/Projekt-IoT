services:
  postgres:
    image: postgres:16-alpine
    container_name: iot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_db
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mosquitto
    environment:
      DATABASE_URL: postgresql+asyncpg://iot_user:iot_password@postgres:5432/iot_db
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_CLIENT_ID: iot-backend
    ports:
      - "8000:8000"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TASK_DISPATCH_TOPIC: iot/task/dispatch
      MQTT_TASK_RESULT_TOPIC: iot/task/result
      MQTT_DEVICE_HEARTBEAT_TOPIC: iot/device/heartbeat
      WORKER_COUNT: 4
      HEARTBEAT_INTERVAL_SECONDS: 5
    volumes:
      - agent_keys:/app/keys

  frontend:
    build: ./frontend
    container_name: iot_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  agent_keys: